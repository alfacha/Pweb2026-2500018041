<!DOCTYPE html>
<html>
<head>
    <title>Tugas HTML Superscript & Subscript</title>
</head>
<body>

    <h2>Contoh Superscript dan Subscript</h2>

    <p>Contoh pangkat atas:</p>
    <p>2<sup>3</sup> = 8</p>
    <p>x<sup>2</sup> + y<sup>2</sup> = z<sup>2</sup></p>

    <hr>

    <p>Contoh pangkat bawah:</p>
    <p>H<sub>2</sub>O (Air)</p>
    <p>CO<sub>2</sub> (Karbon Dioksida)</p>

    <hr>

    <p>Contoh kalimat tambahan:</p>
    <p>
        Rumus luas lingkaran adalah πr<sup>2</sup>.
    </p>

    <p>
        Glukosa memiliki rumus kimia C<sub>6</sub>H<sub>12</sub>O<sub>6</sub>.
    </p>

    <p>
        Dalam matematika, a<sup>2</sup> + b<sup>2</sup> = c<sup>2</sup> disebut teorema Pythagoras.
    </p>

</body>
</html>
